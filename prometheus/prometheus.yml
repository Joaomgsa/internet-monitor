global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: 'speedtest-tracker'
    static_configs:
      - targets: ['speedtest-tracker:80']
    metrics_path: '/prometheus'
    scrape_interval: 5m    # não sobrecarregar a API

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
